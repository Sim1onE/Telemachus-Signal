<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerbal Space Program - Standalone 3D Orbital Map</title>
    
    <!-- Modern Styling -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="starfield"></div>
    <div id="map-container"></div>
    
    <!-- Custom Modern HUD -->
    <div id="ui-overlay">
        <h1 id="vessel-name">MISISON CONTROL</h1>
        <div id="time-readout">UT: 00:00:00</div>
    </div>

    <div id="sidebar">
        <div class="panel-header">SYSTEM OVERVIEW</div>
        
        <div class="control-group">
            <label>FOCUS TARGET</label>
            <select id="focus-selector" class="custom-select">
                <option value="current vessel">CURRENT VESSEL</option>
                <option value="Sun">THE SUN</option>
                <option value="Kerbin">KERBIN</option>
                <option value="Mun">THE MUN</option>
                <option value="Minmus">MINMUS</option>
            </select>
        </div>

        <div class="control-group">
            <label>VISIBILITY</label>
            <div id="body-toggles">
                <!-- Dynamically populated -->
            </div>
        </div>

        <div class="control-group buttons">
            <button id="btn-reset" class="action-btn">RESET CAMERA</button>
            <button id="btn-fullscreen" class="action-btn secondary">FULLSCREEN</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/three.min.js"></script>
    <script src="js/orbit_controls.js"></script>
    <script src="js/math-utils.js"></script>
    <script src="js/telemachus-client.js"></script>
    <script src="js/orbital-data.js"></script>
    <script src="js/orbital-formatter.js"></script>
    <script src="js/orbital-view.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Math.matrixAdd = Math.matrixAdd || function() {
              var arrays = arguments, results = [],
                count, L = arrays.length,
                sum, next = 0, i;
              if (L === 0 || !arrays[0]) return [];
              count = arrays[0].length;
              if (count === undefined) return [];
              
              while (next < count) {
                sum = 0, i = 0;
                while (i < L) {
                  if (arrays[i] && arrays[i][next] !== undefined) {
                    sum += Number(arrays[i++][next]);
                  } else {
                    i++;
                  }
                }
                results[next++] = sum;
              }
              return results;
            };

            // Initialize Settings from LocalStorage
            const settings = new Settings("localhost", 8085);
            
            // Initialize Telemachus Client
            const datalink = new Telemachus(settings.host, settings.port);
            
            // Initialize Position Data Processor
            const positionData = new SystemOrbitalPositionData(datalink, {
                numberOfSegments: 360 // High precision
            });
            
            // Initialize Formatter (The Bible)
            const formatter = new SystemPositionDataFormatter(positionData, datalink);
            
            // Initialize 3D Map View
            const orbitalMap = new SystemOrbitalMap(formatter, datalink, 'map-container');

            // Dynamic UI Updates
            datalink.addReceiverFunction((data) => {
                if (data['v.name']) {
                    document.getElementById('vessel-name').innerText = data['v.name'];
                }
                if (data['t.universalTime']) {
                    document.getElementById('time-readout').innerText = TimeFormatters.formatUT(data['t.universalTime']);
                }
            });

            // Handle Loss of Signal
            document.addEventListener('telemachus:loss-of-signal', () => {
                document.getElementById('vessel-name').innerText = "CONNECTION LOST";
                document.getElementById('vessel-name').style.color = "#ff4444";
            });
        });
    </script>
</body>
</html>
