<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerbal Space Program - Standalone 3D Orbital Map</title>
    
    <!-- Modern Styling -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="starfield"></div>
    <div id="map-container"></div>
    
    <!-- Custom Modern HUD -->
    <div id="ui-overlay">
        <h1 id="vessel-name">MISSION CONTROL</h1>
        <div id="time-readout">UT: 00:00:00</div>
    </div>

    <!-- Sidebar Overview -->
    <div id="sidebar">
        <div class="panel-header">SYSTEM OVERVIEW</div>
        
        <div class="control-group">
            <label>FOCUS TARGET</label>
            <select id="focus-selector" class="custom-select">
                <option value="current vessel">CURRENT VESSEL</option>
                <option value="Sun">THE SUN</option>
                <option value="Kerbin">KERBIN</option>
                <option value="Mun">THE MUN</option>
                <option value="Minmus">MINMUS</option>
            </select>
        </div>

        <div class="control-group">
            <label>VISIBILITY</label>
            <div id="body-toggles">
                <!-- Dynamically populated -->
            </div>
        </div>

        <div class="control-group buttons">
            <button id="btn-reset" class="action-btn">RESET CAMERA</button>
            <button id="btn-fullscreen" class="action-btn secondary">FULLSCREEN</button>
        </div>
    </div>

    <!-- Navball Orientation HUD -->
    <div id="navball-container"></div>

    <!-- Bottom Maneuver HUD -->
    <div id="bottom-hud">
        <div class="hud-section telemetry">
            <div class="hud-label">VESSEL STATE</div>
            <div class="hud-data" id="vessel-stats">
                AP: 0km | PE: 0km | INC: 0.0°
            </div>
        </div>

        <div class="hud-section maneuvers">
            <div class="hud-label">NAV COMMANDS</div>
            <div class="maneuver-grid">
                <button class="nav-btn pro" data-cmd="prograde" title="Prograde">+</button>
                <button class="nav-btn retro" data-cmd="retrograde" title="Retrograde">-</button>
                <div class="spacer"></div>
                <button class="nav-btn norm-p" data-cmd="normal-plus" title="Normal">+</button>
                <button class="nav-btn norm-m" data-cmd="normal-minus" title="Normal">-</button>
                <div class="spacer"></div>
                <button class="nav-btn rad-p" data-cmd="radial-plus" title="Radial In">+</button>
                <button class="nav-btn rad-m" data-cmd="radial-minus" title="Radial Out">-</button>
            </div>
            <div id="node-actions">
                <button class="action-btn" id="btn-add-node">ADD NODE</button>
                <button class="action-btn secondary" id="btn-del-node">DEL NODE</button>
            </div>
        </div>

        <div class="hud-section transfer">
            <div class="hud-label">ASTROGATOR TRANSFER</div>
            <div class="hud-data" id="transfer-info">
                DEST: NONE | BURN: --:--:-- | dV: 0 m/s
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/three.min.js"></script>
    <script src="js/orbit_controls.js"></script>
    <script src="js/math-utils.js"></script>
    <script src="js/telemachus-client.js"></script>
    <script src="js/orbital-data.js"></script>
    <script src="js/orbital-formatter.js"></script>
    <script src="js/navball.js"></script>
    <script src="js/orbital-view.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const settings = new Settings();
            const datalink = new Telemachus(settings.host, settings.port);
            const dataManager = new SystemOrbitalPositionData(datalink);
            const formatter = new SystemPositionDataFormatter(dataManager, datalink);
            const map = new SystemOrbitalMap(formatter, datalink, 'map-container');
            
            // Global access for UI logic
            window.SystemMap = map;

            // Math Extension
            Math.matrixAdd = Math.matrixAdd || function() {
              var arrays = arguments, results = [],
              callback = function(v, i) {
                results[i] = (results[i] || 0) + v;
              };
              for (var i = 0; i < arrays.length; i++) {
                arrays[i].forEach(callback);
              }
              return results;
            };
            
            Math.scaleMatrix = Math.scaleMatrix || function(scalar, matrix) {
              return matrix.map(v => v * scalar);
            };
        });
    </script>
</body>
</html>
