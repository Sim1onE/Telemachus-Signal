<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerbal Space Program - Mission Control Map</title>
    
    <!-- Modern Styling -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="starfield"></div>
    <div id="map-container"></div>
    
    <!-- Custom Modern HUD -->
    <div id="ui-overlay">
        <h1 id="vessel-name">MISSION CONTROL</h1>
        <div id="time-readout">UT: 00:00:00</div>
    </div>

    <!-- Sidebar Overview -->
    <div id="sidebar">
        <div class="panel-header">SYSTEM OVERVIEW</div>
        
        <div class="control-group">
            <label>FOCUS TARGET</label>
            <select id="focus-selector" class="custom-select">
                <option value="current vessel">CURRENT VESSEL</option>
                <option value="Sun">THE SUN</option>
                <option value="Kerbin">KERBIN</option>
                <option value="Mun">THE MUN</option>
                <option value="Minmus">MINMUS</option>
            </select>
        </div>

        <div class="control-group">
            <label>VISIBILITY</label>
            <div id="body-toggles">
                <!-- Dynamically populated -->
            </div>
        </div>

        <div class="control-group" id="target-info-panel" style="padding-bottom: 5px; border-bottom: 1px solid rgba(0, 255, 204, 0.1);">
            <label>TARGET STATUS</label>
            <div id="target-readout" style="color: var(--accent-color); font-size: 0.7rem; text-transform: uppercase;">NO TARGET</div>
        </div>

        <div class="control-group buttons">
            <button id="btn-reset" class="action-btn">RESET CAMERA</button>
            <button id="btn-fullscreen" class="action-btn secondary">FULLSCREEN</button>
        </div>
    </div>

    <!-- Navball Orientation HUD -->
    <div id="navball-container"></div>

    <!-- Bottom Maneuver HUD -->
    <div id="bottom-hud">
        <!-- LEFT: Combined Telemetry & Encounter -->
        <div class="hud-section" id="hud-left" style="flex: 1.5;">
            <div class="hud-label">TACTICAL TELEMETRY</div>
            <div id="vessel-stats-grid" class="hud-data">
                <!-- Multi-line grid populated by JS -->
            </div>
            <div id="encounter-info" style="margin-top: 5px; color: #ffcc00; font-size: 0.7rem; font-weight: bold;">
                <!-- Mun/Minmus encounter -->
            </div>
            <div id="astrogator-dv" style="margin-top: 5px; color: #00ffff; font-size: 0.7rem;">
                <!-- Astrogator dV -->
            </div>
            <div id="node-list-summary" style="margin-top: 5px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 3px; max-height: 40px; overflow-y: auto;">
                <!-- Maneuver nodes -->
            </div>
        </div>

        <!-- CENTER: Maneuver Editor (Perfected) -->
        <div class="hud-section maneuvers" style="flex: 2; border-left: 1px solid rgba(0, 255, 204, 0.2); border-right: 1px solid rgba(0, 255, 204, 0.2);">
            <div class="hud-label" id="maneuver-node-label">MANEUVER DECK</div>
            <div class="control-group" style="padding: 0 0 5px 0;">
                <select id="node-selector" class="custom-select" style="background: rgba(0,255,204,0.05); border: 1px solid rgba(0,255,204,0.2);">
                    <option value="0">NODE 1 (NEXT)</option>
                    <option value="1">NODE 2</option>
                    <option value="2">NODE 3</option>
                </select>
            </div>
            <div class="maneuver-editor">
                <div class="slider-group pro"><label>PRO</label><input type="range" id="slider-pro" min="-1" max="1" step="0.01" value="0"><span id="dv-pro" class="dv-val">0.0</span></div>
                <div class="slider-group norm"><label>NORM</label><input type="range" id="slider-norm" min="-1" max="1" step="0.01" value="0"><span id="dv-norm" class="dv-val">0.0</span></div>
                <div class="slider-group rad"><label>RAD</label><input type="range" id="slider-rad" min="-1" max="1" step="0.01" value="0"><span id="dv-rad" class="dv-val">0.0</span></div>
            </div>
            <div id="pred-stats" style="font-size: 0.65rem; color: #888; text-align: center;">PRED AP: --km | PE: --km</div>
            <div id="node-actions" style="margin-top: 5px; display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; gap: 3px; align-items: center;">
                    <div style="color: #888; font-size: 0.6rem; margin-right: 2px;">SEC:</div>
                    <input type="number" id="node-ut-offset" value="60" class="custom-input" style="width: 45px;">
                    <button class="action-btn" id="btn-add-at-ut" style="padding: 2px 10px; font-weight: bold;">+ CREATE NODE</button>
                </div>
                <button class="action-btn secondary" id="btn-del-node" style="width: auto; padding: 2px 8px;">DEL</button>
            </div>
        </div>

        <!-- RIGHT: Integrated Attitude (Navball) -->
        <div class="hud-section" id="hud-right" style="flex: 1; border-left: 1px solid rgba(0, 255, 204, 0.2); text-align: right;">
            <div class="hud-label">ATTITUDE</div>
            <div id="nav-data-placeholder" style="font-size: 0.65rem; color: #444; margin-top: 20px;">
                <!-- Navball overlayed atop this section -->
            </div>
        </div>
    </div>


    <!-- Scripts -->
    <!-- Scripts -->
    <script src="js/three.min.js"></script>
    <script src="js/orbit_controls.js"></script>
    <script src="js/math-utils.js"></script>
    <script src="js/telemachus-client.js"></script>
    <script src="js/orbital-data.js"></script>
    <script src="js/orbital-formatter.js"></script>
    <script src="js/navball.js"></script>
    <script src="js/orbital-view.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const settings = window.Settings ? new Settings() : { host: 'localhost', port: '8085' };
            const datalink = new Telemachus(settings.host, settings.port);
            const dataManager = new SystemOrbitalPositionData(datalink);
            const formatter = new SystemPositionDataFormatter(dataManager, datalink);
            const map = new SystemOrbitalMap(formatter, datalink, 'map-container');
            
            window.SystemMap = map;

            // Math Extension
            Math.matrixAdd = Math.matrixAdd || function() {
              var arrays = arguments, results = [],
              callback = function(v, i) {
                results[i] = (results[i] || 0) + v;
              };
              for (var i = 0; i < arrays.length; i++) {
                arrays[i].forEach(callback);
              }
              return results;
            };
            
            Math.scaleMatrix = Math.scaleMatrix || function(scalar, matrix) {
              return matrix.map(v => v * scalar);
            };
        });
    </script>
</body>
</html>
