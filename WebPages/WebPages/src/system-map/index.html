<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerbal Space Program - Mission Control Map</title>
    
    <!-- Modern Styling -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="starfield"></div>
    <div id="map-container"></div>
    
    <!-- Custom Modern HUD -->
    <div id="ui-overlay">
        <h1 id="vessel-name">MISSION CONTROL</h1>
        <div id="time-readout">UT: 00:00:00</div>
    </div>

    <!-- Sidebar Overview -->
    <div id="sidebar">
        <div class="panel-header">SYSTEM OVERVIEW</div>
        
        <div class="control-group">
            <label>FOCUS TARGET</label>
            <select id="focus-selector" class="custom-select">
                <option value="current vessel">CURRENT VESSEL</option>
                <option value="Sun">THE SUN</option>
                <option value="Kerbin">KERBIN</option>
                <option value="Mun">THE MUN</option>
                <option value="Minmus">MINMUS</option>
            </select>
        </div>

        <div class="control-group">
            <label>VISIBILITY</label>
            <div id="body-toggles">
                <!-- Dynamically populated -->
            </div>
        </div>

        <div class="control-group buttons">
            <button id="btn-reset" class="action-btn">RESET CAMERA</button>
            <button id="btn-fullscreen" class="action-btn secondary">FULLSCREEN</button>
        </div>
    </div>

    <!-- Navball Orientation HUD -->
    <div id="navball-container"></div>

    <!-- Bottom Maneuver HUD -->
    <div id="bottom-hud">
        <div class="hud-section telemetry">
            <div class="hud-label">VESSEL STATE</div>
            <div class="hud-data" id="vessel-stats">
                AP: 0km | PE: 0km | INC: 0.0°
            </div>
        </div>

        <div class="hud-section maneuvers">
            <div class="hud-label" id="maneuver-node-label">MANEUVERS (NODE 1)</div>
            <div class="control-group" style="margin-bottom: 5px;">
                <label>NODE</label>
                <select id="node-selector" class="custom-select">
                    <option value="0">NODE 1 (NEXT)</option>
                    <option value="1">NODE 2</option>
                    <option value="2">NODE 3</option>
                </select>
            </div>
            <div class="maneuver-editor">
                <div class="slider-group pro">
                    <label>PRO</label>
                    <input type="range" id="slider-pro" min="-1" max="1" step="0.01" value="0">
                    <span id="dv-pro" class="dv-val">0.0</span>
                </div>
                <div class="slider-group norm">
                    <label>NORM</label>
                    <input type="range" id="slider-norm" min="-1" max="1" step="0.01" value="0">
                    <span id="dv-norm" class="dv-val">0.0</span>
                </div>
                <div class="slider-group rad">
                    <label>RAD</label>
                    <input type="range" id="slider-rad" min="-1" max="1" step="0.01" value="0">
                    <span id="dv-rad" class="dv-val">0.0</span>
                </div>
            </div>
            <div id="pred-stats" style="margin-top: 5px; font-size: 0.75rem; color: #00ffff; display: flex; gap: 10px; justify-content: center; font-family: 'Consolas', monospace; text-shadow: 0 0 5px rgba(0,255,255,0.5);">
                PRED AP: --km | PE: --km
            </div>
            <div id="node-actions" style="margin-top: 5px;">
                <div class="placement-controls" style="display: flex; gap: 5px; margin-bottom: 5px;">
                    <input type="number" id="node-ut-offset" value="60" class="custom-input" title="Seconds from now" style="width: 50px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: white; padding: 2px 5px; font-size: 0.65rem;">
                    <button class="action-btn" id="btn-add-at-ut" style="flex: 1; padding: 2px 5px;">+ AT</button>
                    <button class="action-btn" id="btn-add-at-ap" style="flex: 1; padding: 2px 5px;">AP</button>
                    <button class="action-btn" id="btn-add-at-pe" style="flex: 1; padding: 2px 5px;">PE</button>
                    <button class="action-btn secondary" id="btn-del-node" style="padding: 2px 8px;">DEL</button>
                </div>
            </div>
        </div>

        <div class="hud-section transfer">
            <div class="hud-label">ASTROGATOR</div>
            <div class="hud-data" id="transfer-info">
                DEST: NONE | Burn dV: 0 m/s
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/three.min.js"></script>
    <script src="js/orbit_controls.js"></script>
    <script src="js/math-utils.js"></script>
    <script src="js/telemachus-client.js"></script>
    <script src="js/orbital-data.js"></script>
    <script src="js/orbital-formatter.js"></script>
    <script src="js/navball.js"></script>
    <script src="js/orbital-view.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const settings = window.Settings ? new Settings() : { host: 'localhost', port: '8085' };
            const datalink = new Telemachus(settings.host, settings.port);
            const dataManager = new SystemOrbitalPositionData(datalink);
            const formatter = new SystemPositionDataFormatter(dataManager, datalink);
            const map = new SystemOrbitalMap(formatter, datalink, 'map-container');
            
            window.SystemMap = map;

            // Math Extension
            Math.matrixAdd = Math.matrixAdd || function() {
              var arrays = arguments, results = [],
              callback = function(v, i) {
                results[i] = (results[i] || 0) + v;
              };
              for (var i = 0; i < arrays.length; i++) {
                arrays[i].forEach(callback);
              }
              return results;
            };
            
            Math.scaleMatrix = Math.scaleMatrix || function(scalar, matrix) {
              return matrix.map(v => v * scalar);
            };
        });
    </script>
</body>
</html>
