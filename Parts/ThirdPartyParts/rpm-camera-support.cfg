// Adds Telemachus camera capture to any part with an RPM external camera.
// Matches HULLCAM, JSIPrimitiveExternalCamera, and any other part using
// JSIExternalCameraSelector.

@PART[*]:HAS[@MODULE[JSIExternalCameraSelector]]:NEEDS[RasterPropMonitor]:FINAL
{
	MODULE
	{
		name = RasterPropMonitorCamera
	}
}